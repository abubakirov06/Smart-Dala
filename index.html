<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Dala Pro</title>
    <style>
        :root { --primary: #27ae60; --danger: #c0392b; --info: #2980b9; --warning: #e67e22; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; margin: 0; padding: 10px; color: var(--dark); }
        .card { background: white; max-width: 450px; margin: 0 auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Language Bar */
        .lang-bar { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .lang-btn { padding: 8px 12px; font-size: 12px; cursor: pointer; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: 600; transition: 0.3s; }
        .lang-btn.active { background: var(--info); color: white; border-color: var(--info); }

        /* Display Window */
        #display-window { 
            width: 320px; height: 320px; margin: 20px auto; 
            background: #000; border: 5px solid #fff; 
            border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        canvas, img { width: 100%; height: 100%; object-fit: cover; }

        /* Controls */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .action-btn { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .capture-btn { background: var(--warning); grid-column: span 2; display: none; }
        #file-input { display: none; }

        /* Status & AI */
        #status-bar { 
            padding: 15px; border-radius: 12px; color: white; font-weight: bold; 
            margin: 15px 0; background: #7f8c8d; text-transform: uppercase; letter-spacing: 1px;
        }
        #ai-box { 
            display: none; background: #ebf5fb; border-left: 6px solid var(--info); 
            padding: 20px; text-align: left; margin-top: 15px; border-radius: 10px; 
        }
        .ai-btn { background: var(--info); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--info); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-bar">
        <button id="l-en" class="lang-btn active" onclick="setLang('en')">English</button>
        <button id="l-uzl" class="lang-btn" onclick="setLang('uz_lat')">O'zbekcha</button>
        <button id="l-uzc" class="lang-btn" onclick="setLang('uz_cyr')">Ўзбекча</button>
        <button id="l-ru" class="lang-btn" onclick="setLang('ru')">Русский</button>
    </div>

    <h2 style="margin:0; color:var(--primary);">Smart Dala AI</h2>
    <p id="weather-val" style="font-size:14px; color:#666;">Weather: Loading...</p>

    <div id="display-window">
        <div id="webcam-container"></div>
        <img id="img-preview" style="display:none;" />
    </div>

    <button id="btn-capture" class="action-btn capture-btn" onclick="capturePhoto()">📸 Take Photo</button>
    
    <div class="btn-group">
        <button id="btn-camera" class="action-btn" onclick="startCamera()">📷 Camera</button>
        <label id="btn-gallery" for="file-input" class="action-btn">🖼️ Gallery</label>
        <input type="file" id="file-input" accept="image/*" onchange="handleGallery(event)">
    </div>

    <div id="status-bar">Ready</div>

    <div id="ai-box">
        <strong id="ai-header">Advice:</strong>
        <p id="ai-text" style="font-size:14px; line-height:1.5; margin-top:10px;"></p>
        <button id="btn-ai" class="ai-btn" onclick="getAIAdvice()">Get Advice</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/tEtyLwmCq/";
    let model, webcam, currentLang = 'en', lastPrediction = "";

    const translations = {
        en: { camera: "Camera", gallery: "Gallery", capture: "Take Photo", ai_header: "AI Insight:", ai_btn: "Get Advice", loading: "Consulting AI...", healthy: "HEALTHY", alert: "DISEASE DETECTED", ready: "READY" },
        uz_lat: { camera: "Kamera", gallery: "Galereya", capture: "Rasmga olish", ai_header: "AI Maslahati:", ai_btn: "Maslahat olish", loading: "AI maslahat bermoqda...", healthy: "SOG'LOM", alert: "KASALLIK ANIQLANDI", ready: "TAYYOR" },
        uz_cyr: { camera: "Камера", gallery: "Галерея", capture: "Расмга олиш", ai_header: "AI Маслаҳати:", ai_btn: "Маслаҳат олиш", loading: "AI маслаҳат бермоқда...", healthy: "СОҒЛОМ", alert: "КАСАЛЛИК АНИҚЛАНДИ", ready: "ТАЙЁР" },
        ru: { camera: "Камера", gallery: "Галерея", capture: "Сделать фото", ai_header: "AI Совет:", ai_btn: "Получить совет", loading: "AI думает...", healthy: "ЗДОРОВО", alert: "ОБНАРУЖЕНА БОЛЕЗНЬ", ready: "ГОТОВ" }
    };

    const diseaseMap = {
        "Healthy cotton plants and leaves": { en: "Healthy Cotton", uz_lat: "Sog'lom G'oza", uz_cyr: "Соғлом Ғўза", ru: "Здоровый Хлопок" },
        "Bacterial Blight": { en: "Bacterial Blight", uz_lat: "Bakterial Kuyish", uz_cyr: "Бактериал Куйиш", ru: "Бактериальный Ожог" },
        "Cotton curl virus": { en: "Cotton Curl Virus", uz_lat: "Barg Burishishi", uz_cyr: "Барг Буришиши", ru: "Вирус Скручивания" },
        "Fusarium wilt": { en: "Fusarium Wilt", uz_lat: "Fuzarioz So'lish", uz_cyr: "Фузариоз Сўлиш", ru: "Фузариозное Увядание" },
        "Aphids": { en: "Aphids", uz_lat: "Shiralar", uz_cyr: "Ширалар", ru: "Тля" },
        "Cotton armyworm": { en: "Cotton Armyworm", uz_lat: "Ko'sak Qurti", uz_cyr: "Кўсак Қурти", ru: "Совка" }
    };

    window.onload = async () => {
        setLang('en');
        getWeather();
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
    };

    async function getWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=41.55&longitude=60.63&current_weather=true");
            const data = await res.json();
            document.getElementById("weather-val").innerText = `Urgench: ${data.current_weather.temperature}°C | ${data.current_weather.windspeed}km/h`;
        } catch(e) { document.getElementById("weather-val").innerText = "Urgench: 22°C"; }
    }

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`l-${lang === 'uz_lat' ? 'uzl' : lang === 'uz_cyr' ? 'uzc' : lang}`).classList.add('active');
        
        document.getElementById('btn-camera').innerText = "📷 " + translations[lang].camera;
        document.getElementById('btn-gallery').innerText = "🖼️ " + translations[lang].gallery;
        document.getElementById('btn-capture').innerText = "📸 " + translations[lang].capture;
        document.getElementById('ai-header').innerText = translations[lang].ai_header;
        document.getElementById('btn-ai').innerText = translations[lang].ai_btn;
        if (document.getElementById('status-bar').innerText.length < 10) document.getElementById('status-bar').innerText = translations[lang].ready;
    }

    async function startCamera() {
        document.getElementById("img-preview").style.display = "none";
        document.getElementById("webcam-container").style.display = "block";
        document.getElementById("btn-capture").style.display = "flex";
        
        webcam = new tmImage.Webcam(320, 320, true);
        await webcam.setup({ facingMode: "environment" });
        await webcam.play();
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        window.requestAnimationFrame(loop);
    }

    async function loop() {
        if (webcam && webcam.canvas) {
            webcam.update();
            window.requestAnimationFrame(loop);
        }
    }

    async function capturePhoto() {
        const prediction = await model.predict(webcam.canvas);
        webcam.stop();
        document.getElementById("btn-capture").style.display = "none";
        processPrediction(prediction);
    }

    async function handleGallery(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (webcam) webcam.stop();
        document.getElementById("webcam-container").style.display = "none";
        const img = document.getElementById("img-preview");
        img.src = URL.createObjectURL(file);
        img.style.display = "block";
        img.onload = async () => {
            const prediction = await model.predict(img);
            processPrediction(prediction);
        };
    }

    function processPrediction(prediction) {
        let bestMatch = prediction.sort((a, b) => b.probability - a.probability)[0];
        lastPrediction = bestMatch.className;
        
        const bar = document.getElementById("status-bar");
        const aiBox = document.getElementById("ai-box");
        const transName = diseaseMap[lastPrediction] ? diseaseMap[lastPrediction][currentLang] : lastPrediction;

        if (lastPrediction.toLowerCase().includes("healthy")) {
            bar.style.background = "var(--primary)";
            bar.innerText = translations[currentLang].healthy + ": " + transName.toUpperCase();
            aiBox.style.display = "none";
        } else {
            bar.style.background = "var(--danger)";
            bar.innerText = translations[currentLang].alert + ": " + transName.toUpperCase();
            aiBox.style.display = "block";
            document.getElementById("ai-text").innerText = transName;
        }
    }

    async function getAIAdvice() {
        const btn = document.getElementById("btn-ai");
        const text = document.getElementById("ai-text");
        btn.disabled = true;
        text.innerHTML = `<div class="loading-spinner"></div> ${translations[currentLang].loading}`;

        try {
            const response = await fetch("/api/chat", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    detection: lastPrediction,
                    weather: document.getElementById("weather-val").innerText,
                    lang: currentLang
                })
            });
            const data = await response.json();
            text.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            text.innerText = "Error connecting to AI. Please try again.";
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
